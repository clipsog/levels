# https://render.com/docs/blueprint-spec
#
# Use `exec node …` so Node replaces the shell as PID 1. If you use `npm start`, npm
# stays the parent and Render’s port scanner can loop on “New primary port detected”.
services:
  - type: web
    name: levels
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: exec node server/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
